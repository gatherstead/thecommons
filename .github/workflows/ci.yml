name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same branch cancels in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backendServer
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: backend.settings.test
      # dev.py hardcodes PORT 5432; test.py strips "-pooler" (no-op for localhost)
      # and stubs every other external credential, so DATABASE_URL is all CI needs.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv + Python 3.13
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Tests (fast tier, no DB)
        run: uv run python manage.py test --tag=fast
      - name: Tests (db tier, postgres)
        run: uv run python manage.py test --tag=db

  frontend-commons:
    name: frontend (theCommonsWeb)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: theCommonsWeb
    steps:
      - uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1   # pinned for reproducibility; pnpm 11 requires Node >=22.13
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: theCommonsWeb/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type-check (build)
        # `next build` loads the Better Auth route + client: src/lib/db.ts throws if
        # DATABASE_URL is unset, and Better Auth parses the *_BETTER_AUTH_URL values
        # as URLs during prerender. pg.Pool connects lazily and NEXT_PUBLIC_* here are
        # discarded (the real build runs on the VM from .env.local), so these are
        # build-only placeholders — never real creds, nothing secret. Scoped to this
        # step so the tests below run with these unset (matching local vitest, which
        # doesn't load .env.local — eventService falls back to its 127.0.0.1 default).
        env:
          DATABASE_URL: postgres://build:build@localhost:5432/build
          BETTER_AUTH_SECRET: build-only-placeholder-secret
          BETTER_AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          NEXT_PUBLIC_THE_COMMONS_API_KEY: build-placeholder
        run: pnpm build
      - name: Tests (fast tier)
        run: pnpm test:fast
      - name: Tests (db tier)
        run: pnpm test:db

  frontend-broadcast:
    name: frontend (broadcastWeb)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: broadcastWeb
    steps:
      - uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1   # pinned for reproducibility; pnpm 11 requires Node >=22.13
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: broadcastWeb/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type-check (build)
        env:
          VITE_BROADCAST_API_BASE_URL: http://localhost:8000
        run: pnpm build
      - name: Tests (fast tier)
        run: pnpm test:fast
      - name: Tests (db tier)
        run: pnpm test:db

  # Gated deploy: runs only on push to main, only after all three test jobs pass.
  # A failing test on main blocks deploy via `needs:`. Secrets are wired in 16.13
  # (docs/16-12-vm-prep.md). Never trigger on pull_request — repo secrets must not
  # reach fork PRs.
  deploy:
    name: deploy (oracle vm)
    needs: [backend, frontend-commons, frontend-broadcast]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      # appleboy/ssh-action pins the host via a SHA256 `fingerprint`, not a
      # known_hosts file. ORACLE_KNOWN_HOSTS is ssh-keyscan output, so derive the
      # fingerprint from it here — this keeps real host-key verification instead of
      # disabling StrictHostKeyChecking.
      - name: Derive host fingerprint
        id: fp
        env:
          KNOWN_HOSTS: ${{ secrets.ORACLE_KNOWN_HOSTS }}
          HOST: ${{ secrets.ORACLE_HOST }}
        run: |
          set -euo pipefail
          echo "::group::host key diagnostics (fingerprints are public, safe to log)"
          echo "--- fingerprints parsed from ORACLE_KNOWN_HOSTS secret ---"
          printf '%s\n' "$KNOWN_HOSTS" | ssh-keygen -lf - || echo "PARSE FAILED"
          echo "--- live host keys presented by the VM (all types) ---"
          ssh-keyscan -t rsa,ecdsa,ed25519 "$HOST" 2>/dev/null | ssh-keygen -lf - || true
          echo "::endgroup::"
          # drone-ssh (Go crypto/ssh) negotiates host keys ECDSA > RSA > ED25519, so
          # pin whichever the VM will actually present in that order. Pinning ED25519
          # failed because the VM also offers ECDSA, which Go prefers. ORACLE_KNOWN_HOSTS
          # must therefore contain all key types: ssh-keyscan $HOST (no -t).
          fp="$(printf '%s\n' "$KNOWN_HOSTS" | ssh-keygen -lf - | awk '
            /ECDSA/{e=$2} /RSA/{r=$2} /ED25519/{d=$2}
            END{ if (e) print e; else if (r) print r; else print d }')"
          if [ -z "$fp" ]; then
            echo "::error::No host fingerprint found in ORACLE_KNOWN_HOSTS. Set it to the full output of: ssh-keyscan $HOST"
            exit 1
          fi
          echo "Using fingerprint: $fp"
          echo "fingerprint=$fp" >> "$GITHUB_OUTPUT"
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          fingerprint: ${{ steps.fp.outputs.fingerprint }}
          # Mirrors DEPLOY.md §Deploying Updates (validated dry-run in 16-12-vm-prep).
          # uv is at /snap/bin (not on the non-interactive PATH); pnpm is a global
          # npm bin already on PATH. set -e aborts on the first failure.
          script: |
            set -e
            # CI=true lets pnpm purge/rebuild node_modules non-interactively (no TTY
            # over SSH); without it pnpm aborts with ERR_PNPM_ABORTED_REMOVE_MODULES_DIR_NO_TTY.
            export CI=true
            cd /home/ubuntu/thecommons
            # pnpm build regenerates tsconfig.tsbuildinfo locally each run, which used
            # to be tracked in git and would then block the fast-forward pull below.
            # It's a generated TS incremental-build cache, now gitignored — discard any
            # local copy so the pull can proceed even before that lands on this VM.
            git checkout -- theCommonsWeb/tsconfig.tsbuildinfo broadcastWeb/tsconfig.tsbuildinfo 2>/dev/null || true
            git pull origin main

            cd backendServer
            /snap/bin/uv sync
            /snap/bin/uv run python manage.py migrate --noinput
            /snap/bin/uv run python manage.py collectstatic --noinput

            cd ../theCommonsWeb
            pnpm install --frozen-lockfile
            pnpm run build

            cd ../broadcastWeb
            pnpm install --frozen-lockfile
            pnpm run build

            # Bug-class check: a malformed VITE_BROADCAST_API_BASE_URL (e.g. missing
            # "//") builds "successfully" but silently misroutes every API call.
            # Fail here, before the broken build goes live, rather than discovering
            # it later via a confusing 404/405 in production.
            if ! grep -rq 'https\?://[a-zA-Z0-9.-]*thecommons\.town' dist/assets/*.js; then
              echo "::error::broadcastWeb build does not reference a thecommons.town API origin — check broadcastWeb/.env"
              exit 1
            fi

            sudo -n systemctl restart gunicorn nextjs celery celerybeat broadcast-worker
            systemctl is-active gunicorn nextjs celery celerybeat broadcast-worker
      - name: Post-deploy smoke test
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          fingerprint: ${{ steps.fp.outputs.fingerprint }}
          # Confirms the deployed system actually serves correct responses, not
          # just that the systemd units are "active" (a crashing view or a
          # misrouted SPA build both restart cleanly and pass is-active).
          script: |
            set -e
            check() { # check <url> <expected-code>
              code=$(curl -s -o /dev/null -w '%{http_code}' "$1")
              if [ "$code" != "$2" ]; then
                echo "::error::smoke test failed: $1 returned $code, expected $2"
                exit 1
              fi
            }
            check "https://thecommons.town/" 200
            check "https://broadcast.thecommons.town/" 200
            check "https://api.thecommons.town/events/" 200

            # Regression check for the Unix-socket REMOTE_ADDR gap: nginx proxies
            # to gunicorn over a Unix socket, which used to leave REMOTE_ADDR
            # empty and crash django-ratelimit's key="ip" with an unhandled 500
            # on every rate-limited broadcast endpoint. No access code is sent —
            # HasBroadcastAccessCode is checked *inside* the rate-limited view,
            # so an invalid/missing code still exercises the exact IP-resolution
            # path; a healthy system returns 403 regardless of code validity.
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST https://api.thecommons.town/broadcast/direct-recipe \
              -H 'Content-Type: application/json' -d '{"site_key":"none","event":{}}')
            if [ "$code" = "500" ]; then
              echo "::error::broadcast rate-limit path returned 500 (Unix-socket REMOTE_ADDR regression)"
              exit 1
            fi
            if [ "$code" != "403" ]; then
              echo "::error::unexpected status $code from direct-recipe smoke test (expected 403)"
              exit 1
            fi
